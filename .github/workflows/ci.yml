name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build (release)
        run: cargo build --release --verbose
      - name: Test
        run: cargo test --release --verbose
      - name: Smoke test
        run: |
          printf 'FILE\tL1\tL2\tL3\nA\t1\t2\t3\nB\t1\t5\t3\nC\t4\t2\t3\n' > /tmp/in.tab
          ./target/release/cgmlst-dists -i /tmp/in.tab
